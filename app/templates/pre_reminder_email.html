<!doctype html>
<html>
<body style="font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #1B2A4A; background: #ffffff; padding: 24px; margin: 0;">
  <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 600px; margin: auto; background: #ffffff; border: 1px solid #E2E8F0; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);">
    <!-- Header/Logo -->
    <tr>
      <td style="padding: 32px 32px 16px 32px; text-align: center; border-bottom: 1px solid #F1F5F9;">
        <img src="cid:logo" alt="HACRI-E Survey -1" style="max-height: 70px; display: inline-block;" />
        <div style="color: #1B2A4A; font-size: 20px; font-weight: 700; margin-top: 12px; letter-spacing: 0.5px;">
          HACRI-E Survey -1
        </div>
      </td>
    </tr>
    <!-- Content -->
    <tr>
      <td style="padding: 32px;">
        <p style="font-size: 16px; font-weight: 600; margin: 0 0 16px 0;">Dear {{ name }},</p>
        
        <p style="font-size: 15px; line-height: 1.6; color: #334155; margin: 0 0 28px 0;">
          We noticed you registered for the <strong>AI Baseline Survey (Pre-Workshop Survey)</strong> but have not yet completed it. Please click the button below to directly resume and finish your survey:
        </p>

        <!-- CTA Button -->
        <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom: 20px;">
          <tr>
            <td align="center">
              <a href="{{ resume_link }}" style="display: inline-block; background: #1B2A4A; color: #ffffff; font-size: 15px; font-weight: 700; padding: 14px 32px; border-radius: 6px; text-decoration: none; box-shadow: 0 4px 12px rgba(27, 42, 74, 0.15);">
                Click here to take Baseline 1 &rarr;
              </a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
